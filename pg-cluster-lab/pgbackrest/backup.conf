# pgBackRest config for the REPOSITORY host (backup).
#
# This host owns the repository and runs the repo-side commands (stanza-create,
# check, backup, restore, info). The stanza has two PostgreSQL hosts:
#   pg1 = primary  (10.10.0.1) — coordinates pg_backup_start/stop, supplies the
#                                 few files that change during the backup
#   pg2 = standby  (10.10.0.2) — the bulk of the data files are read from here
#
# backup-standby=y makes pgBackRest copy data files from the standby (pg2) to
# offload the primary. It still talks to the primary, and it waits for pg2 to
# replay up to the backup start LSN, so pg2 must be a healthy, caught-up standby
# (this is why the time-delayed pg3 is deliberately NOT part of the stanza).

[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
backup-standby=y
start-fast=y
log-level-console=info
log-level-file=detail

[main]
pg1-host=10.10.0.1
pg1-host-user=postgres
pg1-path=/pgdata
pg1-port=5432
pg1-socket-path=/var/run/postgresql
pg2-host=10.10.0.2
pg2-host-user=postgres
pg2-path=/pgdata
pg2-port=5432
pg2-socket-path=/var/run/postgresql
