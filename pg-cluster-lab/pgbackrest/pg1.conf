# pgBackRest config for the PRIMARY database host (pg1).
#
# The repository lives on the dedicated backup host (10.10.0.4), reached over
# SSH as the postgres user. This host only ever runs archive-push (and, if it
# were ever the restore target, restore); the repo-side commands (stanza-create,
# backup, info) run on the backup host.

[global]
repo1-host=10.10.0.4
repo1-host-user=postgres
log-level-console=info
log-level-file=detail

[main]
pg1-path=/pgdata
pg1-port=5432
pg1-socket-path=/var/run/postgresql
