# pgBackRest config for the STANDBY database host (pg2) that backups are read
# from. In the stanza topology pg2 is the second PostgreSQL host, so locally it
# is referred to as pg2 (no pg2-host -> this host is local). The repository
# lives on the dedicated backup host (10.10.0.4).

[global]
repo1-host=10.10.0.4
repo1-host-user=postgres
log-level-console=info
log-level-file=detail

[main]
pg2-path=/pgdata
pg2-port=5432
pg2-socket-path=/var/run/postgresql
