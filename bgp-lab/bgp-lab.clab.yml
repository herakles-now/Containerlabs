name: bgp-lab

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.30.0.0/24

topology:
  defaults:
    kind: linux
    cap-add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
  kinds:
    linux:
      image: frrouting/frr:latest
  nodes:
    r1:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    r2:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    r3:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    r4:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    r5:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    r6:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    r7:
      binds:
        - configs/daemons:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "r3:eth1"]
    - endpoints: ["r2:eth2", "r5:eth1"]
    - endpoints: ["r3:eth2", "r5:eth2"]
    - endpoints: ["r3:eth3", "r4:eth1"]
    - endpoints: ["r4:eth2", "r6:eth1"]
    - endpoints: ["r6:eth2", "r7:eth1"]
